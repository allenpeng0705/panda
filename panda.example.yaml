# Example Panda config (copy to panda.yaml for local runs).
listen: "127.0.0.1:8080"
upstream: "http://127.0.0.1:11434"

# Optional: Kong / edge injects identity after OIDC. Attestation uses HMAC-then-constant-time
# compare (see gateway.rs). Set PANDA_TRUSTED_GATEWAY_SECRET to the same value as the edge sends.
# trusted_gateway:
#   attestation_header: "X-Panda-Internal"
#   subject_header: "X-User-Id"
#   tenant_header: "X-Tenant-Id"
#   scopes_header: "X-User-Scopes"

# Optional: correlation id for logs and client response echo (default header: x-request-id).
# Falls back to W3C traceparent trace id, then UUID.
# observability:
#   correlation_header: "x-request-id"
#   # Optional ops endpoint auth for /metrics, /plugins/status, /tpm/status, /mcp/status
#   admin_auth_header: "x-panda-admin-secret"
#   admin_secret_env: "PANDA_ADMIN_STATUS_SECRET"
#   # Ops auth telemetry on /metrics:
#   #   panda_ops_auth_allowed_total{endpoint="..."}
#   #   panda_ops_auth_denied_total{endpoint="..."}
#   #   panda_ops_auth_deny_ratio{endpoint="..."}
#   # TPM rejection telemetry on /metrics:
#   #   panda_tpm_budget_rejected_total{bucket_class="anonymous|subject|tenant|subject_tenant"}
#   # Example alert ideas (PromQL):
#   #   sum by (endpoint) (increase(panda_ops_auth_denied_total[5m])) > 20
#   #   sum by (bucket_class) (increase(panda_tpm_budget_rejected_total[5m])) > 100

# Optional: Redis for cross-replica TPM counters (INCRBY panda:tpm:v1:prompt:* and completion:*).
# Env PANDA_REDIS_URL overrides this field.
# tpm:
#   redis_url: "redis://127.0.0.1:6379"
#   # Starter per-instance budget guard (429 when estimated prompt budget is exceeded).
#   # When enabled, responses include:
#   #   x-panda-budget-limit, x-panda-budget-estimate, x-panda-budget-used, x-panda-budget-remaining
#   enforce_budget: false
#   budget_tokens_per_minute: 60000
#   # Optional fixed Retry-After seconds for 429 (default: derived from current minute window).
#   # retry_after_seconds: 30
#
# Observability: inspect the current request bucket budget snapshot.
# curl -s http://127.0.0.1:8080/tpm/status

# Optional: terminate TLS on `listen` (HTTP plaintext disabled). PEM paths must exist at validate time.
# If client_ca_pem is set, mTLS is required.
# tls:
#   cert_pem: "/path/to/fullchain.pem"
#   key_pem: "/path/to/privkey.pem"
#   client_ca_pem: "/path/to/client-ca.pem"

# Optional: load guest Wasm modules (*.wasm) from this directory at startup (Wasmtime).
# Build the sample with: cargo build -p wasm-plugin-sample --target wasm32-unknown-unknown --release
#   then copy target/wasm32-unknown-unknown/release/wasm_plugin_sample.wasm here.
# plugins:
#   directory: "./plugins"
#   # Buffer/request-body hooks only apply when Content-Length <= max_request_body_bytes.
#   max_request_body_bytes: 262144
#   # Best-effort timeout per Wasm hook call; fail behavior controlled by fail_closed.
#   execution_timeout_ms: 25
#   # false => fail open (log + continue), true => fail closed (403 for policy reject, 502 for runtime).
#   fail_closed: false
#   # Optional hot-reload of plugin directory contents.
#   hot_reload: false
#   reload_interval_ms: 2000
#   reload_debounce_ms: 500
#   max_reloads_per_minute: 30
#
# Wasm plugin return-code semantics (from `panda_on_request*` exports):
#   0 => allow
#   1 => reject (policy denied)     -> HTTP 403 when fail_closed=true
#   2 => reject (malformed request) -> HTTP 403 when fail_closed=true
#   n => reject (plugin-specific)   -> HTTP 403 when fail_closed=true
# Runtime/trap/timeout/join failures map to HTTP 502 when fail_closed=true.

# Optional: Phase 3 entry point (JWT bearer required before proxy forwarding).
# identity:
#   require_jwt: true
#   jwt_hs256_secret_env: "PANDA_JWT_HS256_SECRET"
#   accepted_issuers: ["https://issuer.example"]
#   accepted_audiences: ["panda-gateway"]
#   required_scopes: ["gateway:invoke"]
#   enable_token_exchange: true
#   agent_token_secret_env: "PANDA_AGENT_TOKEN_HS256_SECRET"
#   agent_token_ttl_seconds: 300
#   agent_token_scopes: ["agent:invoke"]

# Optional: prompt safety deny patterns (starter jailbreak/injection heuristics).
# prompt_safety:
#   enabled: true
#   deny_patterns:
#     - "ignore previous instructions"
#     - "reveal system prompt"

# Optional: starter PII scrubber (regex-based body redaction on buffered request bodies).
# pii:
#   enabled: true
#   replacement: "[REDACTED]"
#   redact_patterns:
#     - "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
#     - "\\b\\d{3}-\\d{2}-\\d{4}\\b"

# Phase 4: semantic cache (MVP in-memory backend, exact canonical-key match).
# semantic_cache:
#   enabled: false
#   similarity_threshold: 0.92
#   max_entries: 10000
#   ttl_seconds: 300

# Phase 4: universal adapter (OpenAI ingress -> backend protocol).
# adapter:
#   provider: "openai"   # "openai" or "anthropic"
#   anthropic_version: "2023-06-01"
# Notes:
# - Anthropic non-streaming chat is mapped to OpenAI chat completion format.
# - If OpenAI sets stream=true with provider=anthropic, Panda forwards stream to Anthropic and
#   translates Anthropic SSE to OpenAI chat.completion.chunk SSE (including data: [DONE]).

# Phase 4: MCP tool servers (stub transports; wire stdio/SSE clients incrementally).
# When enabled, at least one server entry with enabled=true is required.
# Optional context enrichment (Phase 4 MVP): set env PANDA_CONTEXT_ENRICHMENT_FILE to a text file
# with lines like `keyword => snippet` to inject top-matching snippets as a system message.
# mcp:
#   enabled: false
#   fail_open: true
#   tool_timeout_ms: 30000
#   max_tool_payload_bytes: 1048576
#   max_tool_rounds: 4
#   stream_probe_bytes: 16384
#   probe_window_seconds: 60
#   advertise_tools: false
#   # Proof-of-intent mode: off | audit | enforce
#   proof_of_intent_mode: "off"
#   # OpenAI stream=true + MCP tools: first upstream round is buffered (JSON or SSE) to detect
#   # tool calls; follow-ups keep stream=true; final JSON may be wrapped as SSE for the client.
#   # Optional intent policy examples (names can be `server.tool` or `mcp_server_tool`):
#   # intent_tool_policies:
#   #   - intent: "data_read"
#   #     allowed_tools: ["demo.list_docs"]
#   #   - intent: "data_write"
#   #     allowed_tools: ["demo.update_doc"]
#   servers:
#     - name: demo
#       enabled: true
#       # Optional: real MCP over stdio (JSON-RPC, one JSON object per line). When omitted, server is a stub.
#       # command: "npx"
#       # args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
