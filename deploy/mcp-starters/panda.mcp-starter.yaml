# Starter config for Docker Compose (deploy/mcp-starters). Adjust `upstream` and secrets via .env / mounts.
listen: "0.0.0.0:8080"
# OpenAI-compatible API base (set OPENAI_API_KEY in the container environment).
upstream: "https://api.openai.com/v1"

mcp:
  enabled: true
  fail_open: true
  advertise_tools: true
  tool_timeout_ms: 60000
  max_tool_payload_bytes: 1048576
  max_tool_rounds: 4
  servers:
    # 1) Local workspace (read-only mount ./workspace in compose)
    - name: workspace
      enabled: true
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "/workspace"

    # 2) GitHub — requires GITHUB_PERSONAL_ACCESS_TOKEN in environment
    - name: github
      enabled: true
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-github"]

    # 3) Postgres — hostname `postgres` from compose network
    - name: postgres
      enabled: true
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-postgres"
        - "postgresql://panda:panda@postgres:5432/panda"

    # 4) Knowledge graph memory (ephemeral unless you mount a data dir in a fork)
    - name: memory
      enabled: true
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-memory"]

    # 5) Fetch URLs as markdown — replace with Google Drive when OAuth is configured (see README).
    - name: fetch
      enabled: true
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-fetch"]

    # Optional: Google Drive (enable after mounting gcp-oauth.keys.json — see deploy/mcp-starters/README.md)
    # - name: gdrive
    #   enabled: false
    #   command: "npx"
    #   args: ["-y", "@modelcontextprotocol/server-gdrive", "/secrets/gcp-oauth.keys.json"]

plugins:
  directory: null

semantic_cache:
  enabled: false

adapter:
  provider: "openai"
