# panda.yaml — local profile: multiple MCP servers + one mock HTTP API (integration-test shapes).
#
# One mock process (`examples/gateway_mcp_e2e/mock_corp_api.py`) serves every path below on port 18081.
# Egress allowlist must cover each path prefix you use in `http_tool` / `http_tools`.
#
# Ingress-visible tool names are `mcp_<server_name>_<tool_name>` (see docs/testing_mcp_api_gateway.md).
#
# | Server     | Transport   | Config field   | Example ingress tool name   |
# |------------|-------------|----------------|-----------------------------|
# | corpapi    | REST (egress)| http_tool      | mcp_corpapi_fetch           |
# | corp       | REST (egress)| http_tools[]   | mcp_corp_from_a, mcp_corp_from_b |
# | inventory  | REST (egress)| http_tool      | mcp_inventory_health        |
# | edge       | REST (egress)| http_tool      | mcp_edge_hi                   |
# | mock       | stdio       | command + args | mcp_mock_ping (optional; needs Python) |
# | remote1    | MCP over HTTP | remote_mcp_url | mcp_remote1_<remote_tool> (optional; separate port) |
#
# Quick check:
#   python3 examples/gateway_mcp_e2e/mock_corp_api.py 18081
#   cargo run -p panda-server -- --config panda.yaml
#   ./scripts/gateway_mcp_e2e_smoke.sh
#
# Full commented skeleton (control_plane, tls, routes, …): panda.example.yaml

listen: "127.0.0.1:8080"
upstream: "http://127.0.0.1:5023"

api_gateway:
  ingress:
    enabled: true
  egress:
    enabled: true
    timeout_ms: 5000
    pool_idle_timeout_ms: 0
    corporate:
      # Single base URL: all relative paths in http_tool(s) join to this host.
      default_base: "http://127.0.0.1:18081"
    allowlist:
      allow_hosts: ["127.0.0.1:18081"]
      # Every path prefix used by MCP REST tools must be allowed (longest-prefix match on requests).
      allow_path_prefixes: ["/allowed", "/corp", "/api", "/v1"]

mcp:
  enabled: true
  advertise_tools: true
  fail_open: true
  tool_timeout_ms: 30000
  # Optional: cache selected tool results (allowlist per server.tool — matches YAML tool_name, not ingress prefix).
  tool_cache:
    enabled: true
    backend: memory
    default_ttl_seconds: 300
    max_value_bytes: 65536
    allow:
      - server: corpapi
        tool: fetch
        ttl_seconds: 60
      - server: corp
        tool: from_a
        ttl_seconds: 30
  servers:
    # Server A: single REST tool (same pattern as E2E template + tool-cache integration test).
    - name: corpapi
      enabled: true
      http_tool:
        path: /allowed/toolpath
        method: GET
        tool_name: fetch

    # Server B: two tools on one logical MCP server (`http_tools` — mutually exclusive with `http_tool` on same server).
    - name: corp
      enabled: true
      http_tools:
        - path: /corp/service-a
          method: GET
          tool_name: from_a
        - path: /corp/service-b
          method: GET
          tool_name: from_b

    # Server C: another single-tool server (different paths / ownership in real deployments).
    - name: inventory
      enabled: true
      http_tool:
        path: /v1/status
        method: GET
        tool_name: health

    # Server D: same mock host, different API surface (typical multi-team backends).
    - name: edge
      enabled: true
      http_tool:
        path: /api/hi
        method: GET
        tool_name: hi

    # Optional: stdio MCP (uncomment if `python3` and crates/panda-proxy/tests/mcp_mock_stdio.py exist).
    # Mutually exclusive per server: use `command` OR `http_tool` OR `http_tools` OR `remote_mcp_url`.
    # - name: mock
    #   enabled: true
    #   command: "python3"
    #   args: ["crates/panda-proxy/tests/mcp_mock_stdio.py"]

    # Optional: remote MCP server over HTTP via egress (run a separate listener; see testing doc section 2.3).
    # - name: remote1
    #   enabled: true
    #   remote_mcp_url: "http://127.0.0.1:18082/mcp"
    # Add 127.0.0.1:18082 to allow_hosts and "/" to allow_path_prefixes when enabled.

# Alternative to top-level `listen` / `tls`: nested `server` (merged at load time).
# server:
#   port: 8080
#   address: "127.0.0.1"
#   tls:
#     cert_pem: "/path/to/fullchain.pem"
#     key_pem: "/path/to/privkey.pem"

# Optional: path-based routing (longest path_prefix wins; otherwise `upstream` above).
# Per-route: rate_limit (HTTP RPS; use api_gateway.ingress.rate_limit_redis for shared counters when ingress is enabled),
# methods (optional allowlist: GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, …).
# Global middleware still runs for every hop; these fields override behavior for matching paths.
# routes:
#   - path: /api/inventory
#     upstream: "http://inventory-service:8001"
#     rate_limit:
#       rps: 100
#   - path_prefix: /v1/chat
#     upstream: "https://api.openai.com/v1"
#     tpm_limit: 50000
#     semantic_cache: true
#     type: openai
#     mcp_servers: ["local-db"]
#   - path_prefix: /api/v1/users
#     upstream: "http://user-service.internal:8080"
#     methods: [GET, POST, PUT, PATCH, DELETE]
#   # Optional per-path overrides for AI routing (inherits global `routing` when unset):
#   - path_prefix: /v1/embeddings
#     upstream: "https://api.openai.com/v1"
#     routing:
#       semantic_enabled: false

# Optional: correlate multi-step agent traffic, planner upstream routing, and MCP delegation caps (see docs/ai_routing_strategy.md §3.5).
# agent_sessions:
#   enabled: true
#   header: x-panda-agent-session
#   profile_header: x-panda-agent-profile
#   tpm_isolated_buckets: true
#   # Optional: Bearer JWT claims (validated if identity/jwks or HS256 is configured).
#   jwt_session_claim: panda_agent_session
#   jwt_profile_claim: panda_agent_profile
#   # When any session id is present: min(global mcp.max_tool_rounds, this).
#   mcp_max_tool_rounds_with_session: 6
#   profile_upstream_rules:
#     - profile: research
#       upstream: "https://planner.example/v1"
#       path_prefix: /v1/chat
#       mcp_max_tool_rounds: 3

