<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Panda Face -->
  <circle cx="50" cy="50" r="45" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Left Ear -->
  <circle cx="20" cy="20" r="12" fill="#333"/>
  
  <!-- Right Ear -->
  <circle cx="80" cy="20" r="12" fill="#333"/>
  
  <!-- Left Eye Patch -->
  <ellipse cx="35" cy="40" rx="10" ry="12" fill="#333"/>
  
  <!-- Right Eye Patch -->
  <ellipse cx="65" cy="40" rx="10" ry="12" fill="#333"/>
  
  <!-- Left Eye -->
  <circle cx="35" cy="40" r="4" fill="white"/>
  <circle cx="35" cy="40" r="2" fill="#333"/>
  
  <!-- Right Eye -->
  <circle cx="65" cy="40" r="4" fill="white"/>
  <circle cx="65" cy="40" r="2" fill="#333"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="6" ry="4" fill="#333"/>
  
  <!-- Mouth -->
  <path d="M 45 62 Q 50 67 55 62" stroke="#333" stroke-width="2" fill="none"/>
</svg>