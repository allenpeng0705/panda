# Panda Gateway configuration for HomeClaw
# Based on the working panda.test.yaml file

listen: 127.0.0.1:8081
default_backend: "http://127.0.0.1:5023"

routes:
  - path_prefix: /v1/chat
    backend_base: "http://127.0.0.1:5023"
    type: openai
    mcp_advertise_tools: true
    rate_limit:
      rps: 300
    semantic_cache: true
  # Cloud model route
  - path_prefix: /cloud
    backend_base: "http://127.0.0.1:14005"
    type: openai
    rate_limit:
      rps: 150
    semantic_cache: true

  - path_prefix: /v1/embeddings
    backend_base: "http://127.0.0.1:5066"
    type: openai
    tpm_limit: 100000  # Add this - tokens per minute for cloud model
    rate_limit:
      rps: 200

  - path_prefix: /mcp
    backend: mcp
    backend_base: "http://127.0.0.1:5023"

control_plane:
  enabled: false
  path_prefix: /ops/control
  store:
    kind: memory

api_gateway:
  ingress:
    enabled: true
    routes:
      - path_prefix: /health
        backend: ops
      - path_prefix: /metrics
        backend: ops
        rate_limit:
          rps: 10
      - path_prefix: /v1
        backend: ai
        rate_limit:
          rps: 50
      - path_prefix: /cloud
        backend: ai
        backend_base: "http://127.0.0.1:14005"
        rate_limit:
          rps: 50
      - path_prefix: /mcp
        backend: mcp
        rate_limit:
          rps: 50
      - path_prefix: /test/deny
        backend: deny
  egress:
    enabled: true
    timeout_ms: 5000
    pool_idle_timeout_ms: 0
    corporate:
      default_base: "http://127.0.0.1:18081"
    allowlist:
      allow_hosts: ["127.0.0.1:18081", "127.0.0.1:5023", "127.0.0.1:5066", "127.0.0.1:14005"]
      allow_path_prefixes: ["/allowed", "/corp", "/api", "/v1"]

mcp:
  enabled: true
  advertise_tools: false
  fail_open: true
  tool_timeout_ms: 30000
  tool_cache:
    enabled: true
    backend: memory
    default_ttl_seconds: 300
    max_value_bytes: 65536
    allow:
      - server: corpapi
        tool: fetch
        ttl_seconds: 60
      - server: corp
        tool: from_a
        ttl_seconds: 30
      - server: homeclaw
        tool: inbound
        ttl_seconds: 60
      - server: homeclaw
        tool: ready
        ttl_seconds: 30
  proof_of_intent_mode: "audit"
  intent_tool_policies:
    - intent: "data_read"
      allowed_tools:
        - "mcp_corpapi_fetch"
        - "mcp_corp_from_a"
        - "mcp_inventory_health"
    - intent: "data_write"
      allowed_tools:
        - "mcp_corp_from_b"
    - intent: "general"
      allowed_tools:
        - "mcp_edge_hi"
  servers:
    - name: corpapi
      enabled: true
      http_tool:
        path: /allowed/toolpath
        method: GET
        tool_name: fetch

    - name: corp
      enabled: true
      http_tools:
        - path: /corp/service-a
          method: GET
          tool_name: from_a
        - path: /corp/service-b
          method: GET
          tool_name: from_b

    - name: inventory
      enabled: true
      http_tool:
        path: /v1/status
        method: GET
        tool_name: health

    - name: edge
      enabled: true
      http_tool:
        path: /api/hi
        method: GET
        tool_name: hi

    - name: homeclaw
      enabled: true
      http_tools:
        - path: /inbound
          method: POST
          tool_name: inbound
        - path: /ready
          method: GET
          tool_name: ready

observability:
  prometheus:
    enabled: true

tpm:
  enabled: false

semantic_cache:
  enabled: true

